<h2 class="sr-only">Central Limit Theorem Explorer</h2>

<style>
.clt{padding:1rem 0;font-family:var(--font-sans);}
.row{display:flex;flex-wrap:wrap;gap:16px;align-items:center; margin-bottom:14px;}
.cg{display:flex;align-items:center;gap:7px;}
.db:hover{background:var(--color-background-secondary);}
.db.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);font-weight:500;}
.charts{display:grid;grid-template-columns:repeat(3, minmax(260px, 1fr));gap:18px;align-items:stretch;}
.cc{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:16px;padding:16px 14px 12px;}
.ct{font-size:34px;font-weight:600;margin-bottom:4px;}
.cs{font-size:28px;}
.stat-item{font-size:28px;}
.stat-item b{font-size:32px;}
.db{font-size:28px;padding:8px 14px;}
.cg label{font-size:34px;}
.cg span{font-size:34px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;margin-top:6px;}
.stat-item.highlight b{color:var(--color-text-warning);}
.sep{width:0.5px;height:16px;background:var(--color-border-tertiary);margin:0 2px;}
.skew-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);}
.skew-row.hidden{display:none;}
.flash{border-color:var(--color-border-warning) !important;box-shadow:0 0 0 2px rgba(186,117,23,0.2);}
</style>

<div class="clt">

  <div class="charts">
    <div class="cc">
      <p class="ct">Population</p>
      <div style="position:relative;height:150px"><canvas id="popC"></canvas></div>
    </div>

    <div class="cc">
      <p class="ct">Current sample</p>
      <div style="position:relative;height:150px"><canvas id="samC"></canvas></div>
    </div>

    <div class="cc">
      <p class="ct">Sample means</p>
      <div style="position:relative;height:150px"><canvas id="meaC"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
const N=10000, BINS=30;

function randn(){
  let u=0,v=0;
  while(!u)u=Math.random();
  while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function makeDist(){
  return ()=>randn()*15+50;
}

function arrStat(arr){
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return {m};
}

function hist(data,min,max,bins){
  const w=(max-min)/bins;
  const c=new Array(bins).fill(0);
  data.forEach(v=>{
    let i=Math.max(0,Math.min(bins-1,Math.floor((v-min)/w)));
    c[i]++;
  });
  return c;
}

function binLabels(min,max,bins){
  return Array.from({length:bins},(_,i)=>
    (min+(i+0.5)*(max-min)/bins).toFixed(1)
  );
}

// FIXED GLOBAL AXES (this is the key change)
const POP_MIN=0, POP_MAX=100;
const SAM_MIN=0, SAM_MAX=100;
const MEA_MIN=40, MEA_MAX=60;

const population = Array.from({length:N}, makeDist);

let sampleMeans=[];
let n=10;

function cOpts(){
  return {
    responsive:true,
    maintainAspectRatio:false,
    animation:{duration:120},
    plugins:{legend:{display:false},tooltip:{enabled:false}},
    scales:{
      x:{
        ticks:{maxTicksLimit:6},
        grid:{color:'rgba(0,0,0,0.06)'}
      },
      y:{
        beginAtZero:true,
        grid:{color:'rgba(0,0,0,0.06)'}
      }
    }
  };
}

function makeChart(id,color,min,max){
  return new Chart(document.getElementById(id),{
    type:'bar',
    data:{
      labels:binLabels(min,max,BINS),
      datasets:[{
        data:new Array(BINS).fill(0),
        backgroundColor:color
      }]
    },
    options:cOpts()
  });
}

const popChart=makeChart('popC','#4a44aa',POP_MIN,POP_MAX);
const samChart=makeChart('samC','#1a8a6a',SAM_MIN,SAM_MAX);
const meaChart=makeChart('meaC','#b24b2a',MEA_MIN,MEA_MAX);

function drawSample(){
  const sample=Array.from({length:n},()=>population[Math.floor(Math.random()*N)]);
  const {m}=arrStat(sample);
  sampleMeans.push(m);

  samChart.data.datasets[0].data =
    hist(sample,SAM_MIN,SAM_MAX,BINS);

  meaChart.data.datasets[0].data =
    hist(sampleMeans,MEA_MIN,MEA_MAX,BINS);

  samChart.update();
  meaChart.update();
}

// initial draw
popChart.data.datasets[0].data =
  hist(population,POP_MIN,POP_MAX,BINS);
popChart.update();

setInterval(drawSample, 400);
</script>
