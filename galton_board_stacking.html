<h2 class="sr-only">Galton board: stick figures fall into bins and stack up, then a normal curve is drawn over them</h2>
<canvas id="c" style="display:block;width:100%;"></canvas>
<div style="display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;">
  <button id="btn" style="padding:8px 20px;font-size:14px;font-weight:500;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-info);color:var(--color-text-info);cursor:pointer;">Restart</button>
  <span id="lbl" style="font-size:13px;color:var(--color-text-secondary);"></span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;

const W = 680, H = 520;
canvas.width = W; canvas.height = H;
canvas.style.maxWidth = '100%';

const COL_FIG   = isDark ? '#AFA9EC' : '#534AB7';
const COL_FIG_S = isDark ? '#7F77DD' : '#7F77DD';
const COL_CURVE = isDark ? '#EF9F27' : '#BA7517';
const COL_PEG   = isDark ? '#888780' : '#B4B2A9';
const COL_SLOT  = isDark ? '#555' : '#D3D1C7';
const COL_AXIS  = isDark ? '#5F5E5A' : '#B4B2A9';
const COL_TEXT  = isDark ? '#D3D1C7' : '#888780';

const BINS = 11;
const BIN_W = 44;
const BIN_X0 = W/2 - (BINS*BIN_W)/2;
const FLOOR_Y = H - 54;
const SLOT_TOP = 220;
const PEG_TOP = 82;
const PEG_ROWS = 6;

const FIG_H = 18;
const FIG_W = 14;

const TOTAL = 55;
let figures = [];
let stacked = [];
let binCounts = new Array(BINS).fill(0);
let phase = 'drop';
let curveProgress = 0;
let done = 0;
let raf = null;
let lastTime = 0;
let spawnTimer = 0;
let spawnInterval = 340;

function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function gaussBin(){let b=Math.round(randn()*1.7+(BINS-1)/2);return Math.max(0,Math.min(BINS-1,b));}

function pegGrid(){
  const pegs=[];
  for(let r=0;r<PEG_ROWS;r++){
    const n=r+2, y=PEG_TOP+r*22;
    for(let i=0;i<n;i++){
      const x=W/2-(n-1)*14+i*28;
      pegs.push({x,y});
    }
  }
  return pegs;
}
const PEGS = pegGrid();

function makePath(bin){
  const path=[];
  path.push({x:W/2, y:30});
  let cx=W/2;
  for(let r=0;r<PEG_ROWS;r++){
    const y=PEG_TOP+r*22;
    path.push({x:cx,y});
    cx += (Math.random()<0.5?-1:1)*14;
  }
  const binCx=BIN_X0+bin*BIN_W+BIN_W/2;
  path.push({x:binCx, y:SLOT_TOP+8});
  return path;
}

function stackedY(bin, rank){
  return FLOOR_Y - FIG_H*0.5 - rank*FIG_H*1.05;
}

function spawnFigure(){
  if(done>=TOTAL) return;
  const bin=gaussBin();
  const path=makePath(bin);
  figures.push({path,bin,seg:0,t:0,speed:0.028+Math.random()*0.012,landed:false,x:path[0].x,y:path[0].y,wobble:Math.random()*Math.PI*2});
  done++;
}

function drawPeg(x,y){
  ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);
  ctx.fillStyle=COL_PEG;ctx.fill();
}

function drawSlots(){
  ctx.lineWidth=1;ctx.strokeStyle=COL_SLOT;
  for(let i=0;i<=BINS;i++){
    const x=BIN_X0+i*BIN_W;
    ctx.beginPath();ctx.moveTo(x,SLOT_TOP);ctx.lineTo(x,FLOOR_Y);ctx.stroke();
  }
  ctx.beginPath();ctx.moveTo(BIN_X0-2,FLOOR_Y);ctx.lineTo(BIN_X0+BINS*BIN_W+2,FLOOR_Y);
  ctx.lineWidth=1.5;ctx.strokeStyle=COL_AXIS;ctx.stroke();
}

function drawStickFigure(x,y,wobble,alpha,isStacked){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y);
  ctx.strokeStyle=isStacked?COL_FIG_S:COL_FIG;
  ctx.fillStyle=isStacked?COL_FIG_S:COL_FIG;
  ctx.lineWidth=isStacked?1.2:1.5;
  ctx.lineCap='round';
  const sc=isStacked?0.72:1;
  const hs=5*sc;
  ctx.beginPath();ctx.arc(0,-hs*2,hs,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-hs);ctx.lineTo(0,hs*1.8);ctx.stroke();
  const armA=isStacked?0.2:Math.sin(wobble*2)*0.5;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-hs*1.4*Math.cos(armA),hs+hs*Math.sin(armA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(hs*1.4*Math.cos(armA),hs-hs*Math.sin(armA));ctx.stroke();
  const legA=isStacked?0:Math.sin(wobble*2)*0.4;
  ctx.beginPath();ctx.moveTo(0,hs*1.8);ctx.lineTo(-hs*Math.sin(legA+0.3)*1.2,hs*3.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,hs*1.8);ctx.lineTo(hs*Math.sin(legA-0.3)*1.2,hs*3.2);ctx.stroke();
  ctx.restore();
}

function drawStackedFigures(){
  for(let b=0;b<BINS;b++){
    for(let r=0;r<stacked[b].length;r++){
      const sf=stacked[b][r];
      const tx=BIN_X0+b*BIN_W+BIN_W/2;
      const ty=stackedY(b,r);
      const alpha=sf.settling?0.4+0.6*Math.min(1,sf.age/12):1;
      drawStickFigure(tx,ty,0,alpha,true);
    }
  }
}

function drawCurve(progress){
  if(progress<=0)return;
  const mu=(BINS-1)/2;
  const sigma=1.9;
  const steps=120;
  const pts=[];
  for(let i=0;i<=steps;i++){
    const bx=i/steps*BINS-0.5;
    const g=Math.exp(-0.5*((bx-mu)/sigma)**2);
    const maxStack=Math.max(1,...binCounts);
    const maxY=stackedY(0,maxStack-1);
    const topY=maxY-FIG_H*0.5;
    const rangeY=FLOOR_Y-topY;
    const px=BIN_X0+i*(BINS*BIN_W)/steps;
    const py=FLOOR_Y-g*rangeY*0.97;
    pts.push({px,py});
  }
  const cutIdx=Math.floor(progress*pts.length);
  if(cutIdx<2)return;
  ctx.beginPath();ctx.moveTo(pts[0].px,pts[0].py);
  for(let i=1;i<cutIdx;i++)ctx.lineTo(pts[i].px,pts[i].py);
  ctx.strokeStyle=COL_CURVE;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  if(progress>=1){
    ctx.save();ctx.font='500 13px var(--font-sans,system-ui)';
    ctx.fillStyle=COL_CURVE;ctx.textAlign='center';
    ctx.fillText('normal distribution',W/2,SLOT_TOP-10);ctx.restore();
  }
}

function drawCounts(){
  ctx.save();ctx.font='400 11px var(--font-sans,system-ui)';
  ctx.fillStyle=COL_TEXT;ctx.textAlign='center';
  for(let i=0;i<BINS;i++){
    if(binCounts[i]>0)ctx.fillText(binCounts[i],BIN_X0+i*BIN_W+BIN_W/2,FLOOR_Y+16);
  }
  ctx.restore();
}

function lerp(a,b,t){return a+(b-a)*t;}

function updateFigure(fig,dt){
  if(fig.landed)return;
  fig.wobble+=dt*0.007;
  fig.t+=fig.speed*(dt/16);
  if(fig.t>=1){
    fig.t=0;fig.seg++;
    if(fig.seg>=fig.path.length-1){
      fig.landed=true;
      const rank=binCounts[fig.bin];
      binCounts[fig.bin]++;
      stacked[fig.bin].push({rank,settling:true,age:0});
      return;
    }
  }
  const a=fig.path[fig.seg],b=fig.path[fig.seg+1];
  fig.x=lerp(a.x,b.x,fig.t);
  fig.y=lerp(a.y,b.y,fig.t);
}

function allLanded(){return figures.filter(f=>f.landed).length===TOTAL&&done===TOTAL;}

function frame(ts){
  const dt=Math.min(ts-lastTime,50);
  lastTime=ts;
  ctx.clearRect(0,0,W,H);
  drawSlots();
  PEGS.forEach(p=>drawPeg(p.x,p.y));
  drawStackedFigures();

  if(phase==='drop'){
    spawnTimer+=dt;
    if(spawnTimer>=spawnInterval&&done<TOTAL){
      spawnFigure();spawnTimer=0;
      if(done>28)spawnInterval=200;
      if(done>46)spawnInterval=110;
    }
    stacked.forEach(bin=>bin.forEach(sf=>{if(sf.settling){sf.age++;if(sf.age>15)sf.settling=false;}}));
    figures.forEach(f=>{
      updateFigure(f,dt);
      if(!f.landed){
        const inSlot=f.seg>=f.path.length-2;
        if(!inSlot)drawStickFigure(f.x,f.y,f.wobble,0.92,false);
        else{
          const tx=BIN_X0+f.bin*BIN_W+BIN_W/2;
          const targetY=stackedY(f.bin,binCounts[f.bin]);
          const yy=lerp(f.path[f.seg].y,targetY,f.t);
          drawStickFigure(tx,yy,f.wobble,0.75,false);
        }
      }
    });
    drawCounts();
    if(allLanded()){phase='curve';document.getElementById('lbl').textContent='drawing the normal curve…';}
  } else {
    drawCounts();
    curveProgress+=dt*0.0014;
    if(curveProgress>1)curveProgress=1;
    drawCurve(curveProgress);
    if(curveProgress>=1){
      document.getElementById('lbl').textContent='each column of figures = how many landed in that slot';
      raf=null;return;
    }
  }
  raf=requestAnimationFrame(frame);
}

function start(){
  if(raf)cancelAnimationFrame(raf);
  figures=[];stacked=Array.from({length:BINS},()=>[]);
  binCounts=new Array(BINS).fill(0);
  phase='drop';curveProgress=0;done=0;spawnTimer=0;spawnInterval=340;
  document.getElementById('lbl').textContent='figures fall and bounce off pegs…';
  lastTime=performance.now();
  raf=requestAnimationFrame(t=>{lastTime=t;raf=requestAnimationFrame(frame);});
}

document.getElementById('btn').addEventListener('click',start);
start();
</script>
